version: '3.9'

services:
  about-us-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: about-us-website
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.nexusco.description=NexusCo About Us Website"
      - "com.nexusco.version=1.0.0"

networks:
  default:
    name: nexusco-network